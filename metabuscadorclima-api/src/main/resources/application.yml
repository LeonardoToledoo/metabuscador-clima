server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: metaclima-backend

openmeteo:
  geocoding-base-url: https://geocoding-api.open-meteo.com
  forecast-base-url: https://api.open-meteo.com

weatherapi:
  base-url: https://api.weatherapi.com
  key: ${WEATHERAPI_KEY:}

locationapi:
  base-url: https://api.countrystatecity.in/v1
  key: ${CSCAPI_KEY:}

timeout:
  connect-ms: 4000
  read-ms: 6000

cors:
  allowed-origins:
    - ${FRONTEND_URL:https://metabuscador-clima.vercel.app}
    - http://127.0.0.1:8081
    - http://0.0.0.0:8081
    - http://localhost:8000
    - http://127.0.0.1:8000
    - http://localhost:5500
    - http://127.0.0.1:5500

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
